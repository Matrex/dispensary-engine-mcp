version: "3.9"

services:
  dispensary-mcp:
    build: .
    container_name: dispensary-mcp
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - PEK_SIMILARITY_THRESHOLD=${PEK_SIMILARITY_THRESHOLD:-0.92}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    env_file:
      - .env
